<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600;700;800&amp;display=swap');
      
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .mono { font-family: 'Fira Code', monospace; }

      .bg-card { fill: #0F172A; fill-opacity: 0.75; stroke: rgba(255, 255, 255, 0.08); stroke-width: 1px; }
      .text-main { fill: #F8FAFC; }
      .text-muted { fill: #94A3B8; }
      .text-accent { fill: #22D3EE; }

      .ascii-text {
        font-family: 'Fira Code', monospace;
        font-size: 8.5px;
        line-height: 9.3px;
        white-space: pre;
        fill: url(#asciiGradDark);
        letter-spacing: 1.2px;
      }

      .floating-ascii {
        animation: floatSlow 6s ease-in-out infinite;
      }

      .pill-bg {
        fill: #1E293B;
        stroke: rgba(255, 255, 255, 0.12);
      }

      @keyframes floatSlow {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
    </style>

    <filter id="blurGlowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
    </filter>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <linearGradient id="accentGradDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED; #22D3EE; #10B981; #7C3AED" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE; #10B981; #7C3AED; #22D3EE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981; #7C3AED; #22D3EE; #10B981" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="asciiGradDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE; #818CF8; #C084FC; #22D3EE" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#C084FC">
        <animate attributeName="stop-color" values="#C084FC; #22D3EE; #818CF8; #C084FC" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <clipPath id="cardClip">
      <rect width="1180" height="610" rx="24" ry="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1180" height="610" fill="url(#bgGradDark)" />

    <circle cx="200" cy="150" r="250" fill="#7C3AED" opacity="0.25" filter="url(#blurGlowDark)">
      <animate attributeName="cx" values="200; 250; 200" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="950" cy="450" r="280" fill="#22D3EE" opacity="0.2" filter="url(#blurGlowDark)">
      <animate attributeName="cy" values="450; 400; 450" dur="9s" repeatCount="indefinite" />
    </circle>

    <path d="M 0,60 L 1180,60 M 0,120 L 1180,120 M 0,180 L 1180,180 M 0,240 L 1180,240 M 0,300 L 1180,300 M 0,360 L 1180,360 M 0,420 L 1180,420 M 0,480 L 1180,480 M 0,540 L 1180,540" stroke="rgba(255,255,255,0.02)" stroke-width="1" />

    <g transform="translate(30, 30)">
      <rect width="410" height="550" rx="16" class="bg-card" filter="url(#dropShadow)" />
      <rect width="410" height="550" rx="16" fill="none" stroke="url(#accentGradDark)" stroke-width="1.5" opacity="0.4" />
      <path d="M 0,16 A 16,16 0 0,1 16,0 L 394,0 A 16,16 0 0,1 410,16 L 410,38 L 0,38 Z" fill="rgba(255,255,255,0.03)" />
      <circle cx="20" cy="19" r="5" fill="#EF4444" opacity="0.8" />
      <circle cx="36" cy="19" r="5" fill="#F59E0B" opacity="0.8" />
      <circle cx="52" cy="19" r="5" fill="#10B981" opacity="0.8" />
      <text x="205" y="23" class="mono" font-size="11" fill="#64748B" text-anchor="middle">portrait.asc — 80x52</text>

      <g class="floating-ascii" transform="translate(20, 52)">
        <text class="ascii-text" xml:space="preserve">
<tspan x="0" dy="1.1em">                  ;+=--:,,.::                                   ,.--=++**;      </tspan>
<tspan x="0" dy="1.1em">                 ++****+++=--:,.                                ,-===+++***,     </tspan>
<tspan x="0" dy="1.1em">                ;****##***++=-:.                              ,:=+++***##**,    </tspan>
<tspan x="0" dy="1.1em">               :*****###****+=-:,.                           .:=+++***####**;   </tspan>
<tspan x="0" dy="1.1em">               +****#####***++=-:..                         .-=++++***#####**+  </tspan>
<tspan x="0" dy="1.1em">               +****#####****+==--..                       .--===+++***####**+  </tspan>
<tspan x="0" dy="1.1em">               ;****######***++==-:..                     .:--===++++**#####**; </tspan>
<tspan x="0" dy="1.1em">               ;****########***++==-.                    .:--===++++***#####**; </tspan>
<tspan x="0" dy="1.1em">               :****#########***+++=-,                  .:--====+++****#####**; </tspan>
<tspan x="0" dy="1.1em">               :*****#########***+++=-..               ..:---====+++***####***; </tspan>
<tspan x="0" dy="1.1em">               .+****#########***+++==-:.             ..:----====+++***####***, </tspan>
<tspan x="0" dy="1.1em">                :*****#########****+++==-:.         ..:----====+++****####***;  </tspan>
<tspan x="0" dy="1.1em">                .=*****########****+++==--:...    ..::----=====+++***#####**+   </tspan>
<tspan x="0" dy="1.1em">                 .=******#######***++++==--:::...::::----=====+++***####***+    </tspan>
<tspan x="0" dy="1.1em">                   .=******#######***++++===---::::::::-=====++++**#####**+     </tspan>
<tspan x="0" dy="1.1em">                    .:*******######***+++++====--------=====++++***####***:     </tspan>
<tspan x="0" dy="1.1em">                      .:*******#####***+++++======-----=====++++***###***,      </tspan>
<tspan x="0" dy="1.1em">                        .:********####***+++++======--=====++++**####***.       </tspan>
<tspan x="0" dy="1.1em">                          .:*********####****++++++++=++++++****###***:         </tspan>
<tspan x="0" dy="1.1em">                            ..:**********##****++++++++++++*****##***,          </tspan>
<tspan x="0" dy="1.1em">                                .::-***********#************##****:             </tspan>
<tspan x="0" dy="1.1em">                                    ..::-********************-:.                </tspan>
<tspan x="0" dy="1.1em">                                       .....,,,,,,,....                         </tspan>
<tspan x="0" dy="1.1em">                                 ...::--===========---::...                     </tspan>
<tspan x="0" dy="1.1em">                             ..::-====+++++++++++++++====-::..                  </tspan>
<tspan x="0" dy="1.1em">                          ..:--====++++++++++++++++++++====-::..                </tspan>
<tspan x="0" dy="1.1em">                       ..:--====++++++++++++++++++++++++++====--..              </tspan>
<tspan x="0" dy="1.1em">                      .,--====++++++++++++++++++++++++++++++====--,             </tspan>
<tspan x="0" dy="1.1em">                     .:--====++++++++++++++++++++++++++++++++====-:.            </tspan>
<tspan x="0" dy="1.1em">                    .,-=====++++++++++++++++++++++++++++++++++====-:.           </tspan>
<tspan x="0" dy="1.1em">                    .:-=====++++++++++++++++++++++++++++++++++====-:.           </tspan>
<tspan x="0" dy="1.1em">                    .,--====+++++++++++++++++++++++++++++++++====--,.           </tspan>
<tspan x="0" dy="1.1em">                     .,--====+++++++++++++++++++++++++++++++====--:.            </tspan>
<tspan x="0" dy="1.1em">                      .:--====+++++++++++++++++++++++++++++====--:.             </tspan>
<tspan x="0" dy="1.1em">                        .:-====+++++++++++++++++++++++++++====-:,               </tspan>
<tspan x="0" dy="1.1em">                          .:-====+++++++++++++++++++++++====-:,                 </tspan>
<tspan x="0" dy="1.1em">                            ..:--=====+++++++++++++=====--:,                    </tspan>
<tspan x="0" dy="1.1em">                                .::-=====+++++++=====--:,.                      </tspan>
        </text>
      </g>
    </g>

    <g transform="translate(465, 30)">
      <rect width="685" height="550" rx="16" class="bg-card" filter="url(#dropShadow)" />
      <rect width="685" height="550" rx="16" fill="none" stroke="url(#accentGradDark)" stroke-width="1.5" opacity="0.3" />
      <path d="M 0,16 A 16,16 0 0,1 16,0 L 669,0 A 16,16 0 0,1 685,16 L 685,42 L 0,42 Z" fill="rgba(255,255,255,0.03)" />
      <circle cx="22" cy="21" r="5.5" fill="#EF4444" opacity="0.85" />
      <circle cx="39" cy="21" r="5.5" fill="#F59E0B" opacity="0.85" />
      <circle cx="56" cy="21" r="5.5" fill="#10B981" opacity="0.85" />
      <text x="342" y="25" class="mono" font-size="12" fill="#64748B" text-anchor="middle">yunus@developer-station:~</text>

      <g transform="translate(35, 70)">
        <g>
          <text x="0" y="0" font-size="16" font-weight="600" fill="#22D3EE" class="mono">Hi 👋 I'm</text>
          <text x="0" y="38" font-size="34" font-weight="800" fill="#F8FAFC" letter-spacing="-0.5">Yunus Emre Celik</text>
        </g>

        <g transform="translate(0, 75)">
          <text x="0" y="0" class="mono" font-size="18" font-weight="600" fill="url(#accentGradDark)">
            &gt; <tspan>Full Stack Developer</tspan>
            <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite" />
          </text>
          <rect x="235" y="-15" width="9" height="18" fill="#22D3EE">
            <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
          </rect>
        </g>

        <g transform="translate(0, 115)" font-size="13.5">
          <g transform="translate(0, 0)">
            <text x="0" y="0" class="mono" fill="#64748B">Location</text>
            <text x="130" y="0" font-weight="500" fill="#F8FAFC">Turkiye</text>
          </g>
          <g transform="translate(0, 28)">
            <text x="0" y="0" class="mono" fill="#64748B">Education</text>
            <text x="130" y="0" font-weight="500" fill="#F8FAFC">Computer Science</text>
          </g>
          <g transform="translate(0, 56)">
            <text x="0" y="0" class="mono" fill="#64748B">Focus</text>
            <text x="130" y="0" font-weight="500" fill="#F8FAFC">AI Enthusiast &amp; Web Architect</text>
          </g>
          <g transform="translate(0, 84)">
            <text x="0" y="0" class="mono" fill="#64748B">Portfolio</text>
            <text x="130" y="0" font-weight="500" fill="#22D3EE">yunusemrecelik.netlify.app</text>
          </g>
          <g transform="translate(0, 112)">
            <text x="0" y="0" class="mono" fill="#64748B">Email</text>
            <text x="130" y="0" font-weight="500" fill="#F8FAFC">yunusemrecelikbusiness@gmail.com</text>
          </g>
        </g>

        <line x1="0" y1="255" x2="615" y2="255" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

        <g transform="translate(0, 275)">
          <text x="0" y="0" class="mono" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="1">SKILLS &amp; TECHNOLOGIES</text>
          <g transform="translate(0, 15)">
            <g transform="translate(0, 0)"><rect width="78" height="28" rx="7" class="pill-bg" /><text x="39" y="18" class="mono" font-size="11" font-weight="500" fill="#42B883" text-anchor="middle">Django</text></g>
            <g transform="translate(86, 0)"><rect width="82" height="28" rx="7" class="pill-bg" /><text x="41" y="18" class="mono" font-size="11" font-weight="500" fill="#38BDF8" text-anchor="middle">VS Code</text></g>
            <g transform="translate(176, 0)"><rect width="90" height="28" rx="7" class="pill-bg" /><text x="45" y="18" class="mono" font-size="11" font-weight="500" fill="#34D399" text-anchor="middle">Supabase</text></g>
            <g transform="translate(274, 0)"><rect width="72" height="28" rx="7" class="pill-bg" /><text x="36" y="18" class="mono" font-size="11" font-weight="500" fill="#61DAFB" text-anchor="middle">React</text></g>
            <g transform="translate(354, 0)"><rect width="70" height="28" rx="7" class="pill-bg" /><text x="35" y="18" class="mono" font-size="11" font-weight="500" fill="#F97316" text-anchor="middle">HTML5</text></g>
            <g transform="translate(432, 0)"><rect width="76" height="28" rx="7" class="pill-bg" /><text x="38" y="18" class="mono" font-size="11" font-weight="500" fill="#F8FAFC" text-anchor="middle">GitHub</text></g>
            <g transform="translate(516, 0)"><rect width="96" height="28" rx="7" class="pill-bg" /><text x="48" y="18" class="mono" font-size="11" font-weight="500" fill="#FACC15" text-anchor="middle">JavaScript</text></g>
            <g transform="translate(0, 36)"><rect width="74" height="28" rx="7" class="pill-bg" /><text x="37" y="18" class="mono" font-size="11" font-weight="500" fill="#38BDF8" text-anchor="middle">Python</text></g>
            <g transform="translate(82, 36)"><rect width="80" height="28" rx="7" class="pill-bg" /><text x="40" y="18" class="mono" font-size="11" font-weight="500" fill="#FB923C" text-anchor="middle">Claude</text></g>
            <g transform="translate(170, 36)"><rect width="84" height="28" rx="7" class="pill-bg" /><text x="42" y="18" class="mono" font-size="11" font-weight="500" fill="#10B981" text-anchor="middle">ChatGPT</text></g>
            <g transform="translate(262, 36)"><rect width="78" height="28" rx="7" class="pill-bg" /><text x="39" y="18" class="mono" font-size="11" font-weight="500" fill="#818CF8" text-anchor="middle">Gemini</text></g>
            <g transform="translate(348, 36)"><rect width="64" height="28" rx="7" class="pill-bg" /><text x="32" y="18" class="mono" font-size="11" font-weight="500" fill="#DC2626" text-anchor="middle">Java</text></g>
            <g transform="translate(420, 36)"><rect width="74" height="28" rx="7" class="pill-bg" /><text x="37" y="18" class="mono" font-size="11" font-weight="500" fill="#60A5FA" text-anchor="middle">Docker</text></g>
            <g transform="translate(502, 36)"><rect width="80" height="28" rx="7" class="pill-bg" /><text x="40" y="18" class="mono" font-size="11" font-weight="500" fill="#E11D48" text-anchor="middle">MATLAB</text></g>
          </g>
