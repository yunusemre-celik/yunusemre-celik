      <g class="floating-ascii" transform="translate(50, 160)">
        <text class="ascii-text" xml:space="preserve" font-size="22px" line-height="26px" letter-spacing="2px">
<tspan x="0" dy="1.2em">     .--</tspan>
<tspan x="0" dy="1.2em"> .--'  '.   </tspan>
<tspan x="0" dy="1.2em">=`..-.'_ `---,  </tspan>
<tspan x="0" dy="1.2em">      ` ` .\'    </tspan>
<tspan x="0" dy="1.2em">           `'BP</tspan>
        </text>
