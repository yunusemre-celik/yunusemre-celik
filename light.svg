            <g transform="translate(86, 0)"><rect width="82" height="28" rx="7" class="pill-bg" /><text x="41" y="18" class="mono" font-size="11" font-weight="600" fill="#0284C7" text-anchor="middle">VS Code</text></g>
            <g transform="translate(176, 0)"><rect width="90" height="28" rx="7" class="pill-bg" /><text x="45" y="18" class="mono" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">Supabase</text></g>
            <g transform="translate(274, 0)"><rect width="72" height="28" rx="7" class="pill-bg" /><text x="36" y="18" class="mono" font-size="11" font-weight="600" fill="#0284C7" text-anchor="middle">React</text></g>
