            <g transform="translate(0, 36)"><rect width="74" height="28" rx="7" class="pill-bg" /><text x="37" y="18" class="mono" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">Python</text></g>
            <g transform="translate(82, 36)"><rect width="80" height="28" rx="7" class="pill-bg" /><text x="40" y="18" class="mono" font-size="11" font-weight="600" fill="#C2410C" text-anchor="middle">Claude</text></g>
            <g transform="translate(170, 36)"><rect width="84" height="28" rx="7" class="pill-bg" /><text x="42" y="18" class="mono" font-size="11" font-weight="600" fill="#059669" text-anchor="middle">ChatGPT</text></g>
            <g transform="translate(262, 36)"><rect width="78" height="28" rx="7" class="pill-bg" /><text x="39" y="18" class="mono" font-size="11" font-weight="600" fill="#4F46E5" text-anchor="middle">Gemini</text></g>
            <g transform="translate(348, 36)"><rect width="64" height="28" rx="7" class="pill-bg" /><text x="32" y="18" class="mono" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">Java</text></g>
            <g transform="translate(420, 36)"><rect width="74" height="28" rx="7" class="pill-bg" /><text x="37" y="18" class="mono" font-size="11" font-weight="600" fill="#0284C7" text-anchor="middle">Docker</text></g>
            <g transform="translate(502, 36)"><rect width="80" height="28" rx="7" class="pill-bg" /><text x="40" y="18" class="mono" font-size="11" font-weight="600" fill="#E11D48" text-anchor="middle">MATLAB</text></g>
