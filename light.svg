<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600;700;800&amp;display=swap');
      
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .mono { font-family: 'Fira Code', monospace; }

      .bg-card { fill: #FFFFFF; fill-opacity: 0.85; stroke: rgba(15, 23, 42, 0.08); stroke-width: 1px; }
      .ascii-text { font-family: 'Fira Code', monospace; font-size: 8.5px; line-height: 9.3px; white-space: pre; fill: url(#asciiGradLight); letter-spacing: 1.2px; }
      .floating-ascii { animation: floatSlow 6s ease-in-out infinite; }
      .pill-bg { fill: #F1F5F9; stroke: rgba(15, 23, 42, 0.08); }

      @keyframes floatSlow { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    </style>

    <linearGradient id="bgGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>

    <linearGradient id="accentGradLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <linearGradient id="asciiGradLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>

    <clipPath id="cardClipLight">
      <rect width="1180" height="610" rx="24" ry="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#cardClipLight)">
    <rect width="1180" height="610" fill="url(#bgGradLight)" />
    <path d="M 0,60 L 1180,60 M 0,120 L 1180,120 M 0,180 L 1180,180 M 0,240 L 1180,240 M 0,300 L 1180,300 M 0,360 L 1180,360 M 0,420 L 1180,420 M 0,480 L 1180,480 M 0,540 L 1180,540" stroke="rgba(15,23,42,0.03)" stroke-width="1" />

    <g transform="translate(30, 30)">
      <rect width="410" height="550" rx="16" class="bg-card" />
      <rect width="410" height="550" rx="16" fill="none" stroke="url(#accentGradLight)" stroke-width="1.5" opacity="0.3" />
      <path d="M 0,16 A 16,16 0 0,1 16,0 L 394,0 A 16,16 0 0,1 410,16 L 410,38 L 0,38 Z" fill="rgba(15,23,42,0.03)" />
      <circle cx="20" cy="19" r="5" fill="#EF4444" opacity="0.8" />
      <circle cx="36" cy="19" r="5" fill="#F59E0B" opacity="0.8" />
