          <g transform="translate(0, 28)"><text x="0" y="0" class="mono" fill="#64748B">Education</text><text x="130" y="0" font-weight="500" fill="#0F172A">Computer Science</text></g>
          <g transform="translate(0, 56)"><text x="0" y="0" class="mono" fill="#64748B">Focus</text><text x="130" y="0" font-weight="500" fill="#0F172A">AI Enthusiast &amp; Web Architect</text></g>
          <g transform="translate(0, 84)"><text x="0" y="0" class="mono" fill="#64748B">Portfolio</text><text x="130" y="0" font-weight="500" fill="#0284C7">yunusemrecelik.netlify.app</text></g>
          <g transform="translate(0, 112)"><text x="0" y="0" class="mono" fill="#64748B">Email</text><text x="130" y="0" font-weight="500" fill="#0F172A">yunusemrecelikbusiness@gmail.com</text></g>
        </g>

