      <path d="M 0,16 A 16,16 0 0,1 16,0 L 669,0 A 16,16 0 0,1 685,16 L 685,42 L 0,42 Z" fill="rgba(15,23,42,0.03)" />
      <circle cx="22" cy="21" r="5.5" fill="#EF4444" opacity="0.85" />
